<!DOCTYPE html>
<html>
<head>
    <style>
        .print-block { display: none; }
        @media print {
            .print-block { display: block !important; }
            .print-w-full { width: 100% !important; }
            .print-m-0 { margin: 0 !important; }
            .print-p-0 { padding: 0 !important; }
            .print-bg-white { background-color: white !important; }
            .print-text-black { color: black !important; }
            .print-hidden { display: none !important; }
            .print-shadow-none { box-shadow: none !important; }
            .print-max-w-none { max-width: none !important; }
            .print-overflow-visible { overflow: visible !important; }
        }
    </style>
</head>
<body class="bg-black text-white print-bg-white print-text-black">
    <div class="min-h-screen bg-black pb-20 print-bg-white print-text-black print-pb-0">
        <nav class="print-hidden">Navbar</nav>
        <div class="flex flex-col lg:flex-row gap-8 items-start print-block print-w-full print-m-0 print-p-0 bg-black print-bg-white text-white print-text-black">
            <div class="print-hidden">Sidebar</div>
            <div class="flex-1 w-full overflow-x-auto pb-10 print-p-0 print-m-0 print-w-full print-overflow-visible flex justify-center">
                <div class="mx-auto shadow-xl print-shadow-none print-w-full print-max-w-none print-p-0 print-m-0 bg-white" style="width: 210mm; min-height: 297mm; padding: 15mm; background-color: #ffffff; box-sizing: border-box;">
                    <div style="font-family: Arial, Helvetica, sans-serif; color: #1f2937; font-size: 0.875rem; line-height: 1.5;">
                        <h1 style="font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #000; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 12px; text-align: center;">John Doe</h1>
                        <p style="color: #444;">Software Engineer</p>
                        <h2 style="font-size: 16px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; color: #222; margin-top: 16px; margin-bottom: 8px; border-bottom: 1px solid #ccc; padding-bottom: 2px;">Experience</h2>
                        <p>Here is my experience text. It must be at least 50 characters so we can extract it properly. Tailwind-like wrapper applied.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
